<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>QR Code Card</title>
    <!-- Import Bootstrap CSS -->
    <meta
      name="description"
      content="A simple QR code card design using HTML and CSS."
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-YS1Yc2Wh3pOqk5wzN6y5ZOyfvhtVgF3unZNxTaMzJa1Fq0nNK/6Xcctk6rmBm7I5"
      crossorigin="anonymous"
    />

    <!-- Import Outfit font weights 400 & 700 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!--comment out styless.css-->
    <!-- <link rel="stylesheet" href="styles.css" /> -->
  </head>
  <!-- Import Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-Piv4xVNRyMGpqk6H+6Fy5nHuP+0U8z2b3l2Y4rE0q6g5nY5i5zQ1Z1Wj0g2X1O1N"
    crossorigin="anonymous"
  ></script>

  <body>
    <div class="card">
      <div class="card__image">
        <img src="images/image-qr-code.png" alt="QR Code" />
      </div>
      <h1 class="card__title">
        Improve your front-end skills by building projects
      </h1>
      <p class="card__text">
        Scan the QR code to visit Frontend Mentor and take your coding skills to
        the next level
      </p>
    </div>
  </body>
</html>
