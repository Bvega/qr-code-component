<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>QR Code Card</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Outfit font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap"
    rel="stylesheet"
  />
</head>
<body
  class="d-flex justify-content-center align-items-center min-vh-100"
  style="background-color: #E0E8F9; font-family: 'Outfit', sans-serif;"
>
  <div
    class="card text-center rounded-3"
    style="
      width: 100%;
      max-width: 320px;
      height: 528px;
      padding: 16px;
      padding-bottom: 40px;
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1);
    "
  >
    <div
      class="overflow-hidden rounded-2"
      style="background-color: #6348FF;"
    >
      <img
        src="images/image-qr-code.png"
        alt="QR Code"
        class="img-fluid w-100 d-block"
      />
    </div>
    <h1
      class="mt-4 mb-0"
      style="
        font-size: 18px;
        line-height: 28px;
        font-weight: 600;
        color: #1F2F56;
      "
    >
      Improve your front-end skills by building projects
    </h1>
    <p
      class="mt-3 mb-0"
      style="
        font-size: 15px;
        line-height: 25px;
        font-weight: 400;
        color: #6B7A99;
      "
    >
      Scan the QR code to visit Frontend Mentor and take your coding skills to the next level
    </p>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
